spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/budgeteer}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:5001}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:no-reply@budgeteer.local}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-characters}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}
  auth:
    # For real email flows, keep this false.
    expose-reset-token: ${EXPOSE_RESET_TOKEN:false}
