services:
  db:
    image: postgres:16-alpine
    container_name: budgeteer-db
    environment:
      POSTGRES_DB: budgeteer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - budgeteer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budgeteer"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgeteer-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/budgeteer
      DB_USER: postgres
      DB_PASSWORD: password
      PORT: 5001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-characters}
      JWT_TTL_SECONDS: 86400
      EXPOSE_RESET_TOKEN: "false"
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@budgeteer.local}
      MAIL_SMTP_AUTH: "true"
      MAIL_SMTP_STARTTLS: "true"
    ports:
      - "5001:5001"

 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
 
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: budgeteer-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
volumes:
  budgeteer_db_data:
